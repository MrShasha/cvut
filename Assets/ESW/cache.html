<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor Cache Architektury</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        .controls { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        select, input, button { padding: 8px 12px; border: none; border-radius: 4px; background: #3d3d3d; color: #fff; }
        button { background: #0984e3; cursor: pointer; font-weight: bold; }
        button:hover { background: #74b9ff; color: #000; }
        .btn-danger { background: #d63031; }
        .btn-danger:hover { background: #ff7675; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-weight: bold; }
        .stat-box { background: #2d2d2d; padding: 10px 20px; border-radius: 8px; border-left: 4px solid #0984e3; }
        .cache-container { display: grid; gap: 15px; }
        .set-box { background: #2d2d2d; border: 1px solid #444; border-radius: 8px; padding: 10px; }
        .set-title { font-size: 0.9em; color: #aaa; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .blocks-container { display: flex; gap: 10px; }
        .block { flex: 1; background: #111; border: 1px dashed #555; height: 40px; display: flex; align-items: center; justify-content: center; font-family: monospace; border-radius: 4px; transition: all 0.3s ease; }
        .block.filled { background: #00b894; border: 1px solid #55efc4; color: #000; font-weight: bold; }
        .block.highlight { animation: pulse 0.5s ease-out; background: #fdcb6e; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="controls">
        <select id="archSelect">
            <option value="8">Přímé mapování (8 Setů, 1 Blok)</option>
            <option value="4">2-Cestná (4 Sety, 2 Bloky)</option>
            <option value="1">Plně asociativní (1 Set, 8 Bloků)</option>
        </select>
        <input type="number" id="addressInput" placeholder="Zadej adresu bloku (např. 0)" min="0">
        <button onclick="processAccess()">Načíst do Cache</button>
        <button onclick="runPathological()" class="btn-danger">Simulovat patologický konflikt</button>
        <button onclick="initCache()">Reset</button>
    </div>

    <div class="stats">
        <div class="stat-box">Hity: <span id="hits">0</span></div>
        <div class="stat-box">Missy: <span id="misses">0</span></div>
        <div class="stat-box">Hit Rate: <span id="hitrate">0</span>%</div>
    </div>

    <div id="cacheGrid" class="cache-container"></div>

    <script>
        let cache = [];
        let numSets = 8;
        let blocksPerSet = 1;
        let hits = 0; let misses = 0;

        const cacheGrid = document.getElementById('cacheGrid');
        const archSelect = document.getElementById('archSelect');
        const addrInput = document.getElementById('addressInput');

        archSelect.addEventListener('change', (e) => {
            numSets = parseInt(e.target.value);
            blocksPerSet = 8 / numSets;
            initCache();
        });

        function initCache() {
            cache = Array.from({ length: numSets }, () => []);
            hits = 0; misses = 0;
            updateStats();
            renderCache();
        }

        function renderCache() {
            cacheGrid.style.gridTemplateColumns = `repeat(${Math.min(numSets, 4)}, 1fr)`;
            cacheGrid.innerHTML = '';
            
            for (let i = 0; i < numSets; i++) {
                const setDiv = document.createElement('div');
                setDiv.className = 'set-box';
                setDiv.id = `set-${i}`;
                
                const title = document.createElement('div');
                title.className = 'set-title';
                title.innerText = `Zóna (Set) ${i}`;
                setDiv.appendChild(title);

                const blocksDiv = document.createElement('div');
                blocksDiv.className = 'blocks-container';
                
                for (let j = 0; j < blocksPerSet; j++) {
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'block';
                    blockDiv.id = `block-${i}-${j}`;
                    
                    if (cache[i] && cache[i][j] !== undefined) {
                        blockDiv.innerText = `Adr: ${cache[i][j]}`;
                        blockDiv.classList.add('filled');
                    } else {
                        blockDiv.innerText = '[ Prázdno ]';
                    }
                    blocksDiv.appendChild(blockDiv);
                }
                setDiv.appendChild(blocksDiv);
                cacheGrid.appendChild(setDiv);
            }
        }

        function processAccess(address = null) {
            const addr = address !== null ? address : parseInt(addrInput.value);
            if (isNaN(addr)) return;

            const setIndex = addr % numSets;
            const targetSet = cache[setIndex];

            // Animace cílového setu
            const setUI = document.getElementById(`set-${setIndex}`);
            setUI.style.borderColor = '#fdcb6e';
            setTimeout(() => setUI.style.borderColor = '#444', 500);

            const existingIndex = targetSet.indexOf(addr);

            if (existingIndex !== -1) {
                // Cache Hit
                hits++;
                const blockUI = document.getElementById(`block-${setIndex}-${existingIndex}`);
                highlightBlock(blockUI);
            } else {
                // Cache Miss
                misses++;
                if (targetSet.length >= blocksPerSet) {
                    targetSet.shift(); // Eviction (vyhodí nejstarší - FIFO zjednodušení)
                }
                targetSet.push(addr);
                renderCache(); // Znovuvykreslení nového stavu
                
                // Zvýraznění nově přidaného
                const newIndex = targetSet.length - 1;
                const blockUI = document.getElementById(`block-${setIndex}-${newIndex}`);
                highlightBlock(blockUI);
            }
            updateStats();
        }

        function highlightBlock(element) {
            if(!element) return;
            element.classList.remove('highlight');
            void element.offsetWidth; // Trigger reflow
            element.classList.add('highlight');
        }

        function updateStats() {
            document.getElementById('hits').innerText = hits;
            document.getElementById('misses').innerText = misses;
            const total = hits + misses;
            document.getElementById('hitrate').innerText = total === 0 ? "0" : Math.round((hits / total) * 100);
        }

        async function runPathological() {
            initCache();
            const sequence = [0, 8, 16, 24, 0, 8, 16, 24]; // Simulace skoků po mocninách dvojky
            for (let addr of sequence) {
                addrInput.value = addr;
                processAccess(addr);
                await new Promise(r => setTimeout(r, 800)); // Pauza pro vizualizaci
            }
        }

        initCache();
    </script>
</body>
</html>
